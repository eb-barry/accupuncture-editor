<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>針灸定位影像編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=LXGW+WenKai+TC&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --panel: #161616; --panel-border: #2a2a2a;
    --surface: #1e1e1e; --surface2: #272727;
    --accent: #c0392b; --accent-light: #e74c3c; --accent-glow: rgba(192,57,43,0.25);
    --text: #e8e4dc; --text-muted: #7a7672; --text-dim: #4a4846;
    --radius: 6px; --font-body: 'Noto Sans TC', sans-serif; --font-display: 'Noto Serif TC', serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 13px; overflow: hidden; }
  #app { display: flex; height: 100vh; }
  #sidebar { width: 248px; min-width: 248px; background: var(--panel); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; overflow: hidden; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #toolbar { height: 44px; background: var(--panel); border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; gap: 6px; padding: 0 12px; flex-shrink: 0; }
  #canvas-area { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: #080808; background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px); background-size: 24px 24px; cursor: crosshair; position: relative; }
  #canvas-wrapper { position: relative; display: inline-block; line-height: 0; }
  #main-canvas { display: block; cursor: crosshair; }

  /* Sidebar */
  .sidebar-logo { padding: 16px 16px 12px; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
  .sidebar-logo h1 { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .05em; line-height: 1.4; }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-logo p { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: .08em; }
  .sidebar-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .s-section { padding: 12px 16px; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
  .s-label { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 9px; font-weight: 500; }

  /* Color grid */
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #fff; transform: scale(1.15); }
  .custom-color-row { display: flex; align-items: center; gap: 8px; }
  .custom-color-row label { font-size: 11px; color: var(--text-muted); flex: 1; }
  .color-picker-btn { width: 32px; height: 22px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-row label { font-size: 11px; color: var(--text-muted); width: 26px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; background: var(--surface2); border-radius: 2px; outline: none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent-light); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 5px var(--accent-glow); }
  .slider-row span { font-size: 11px; color: var(--text); width: 30px; text-align: right; flex-shrink: 0; }

  /* Preview */
  #ball-preview-wrap { display: flex; align-items: center; justify-content: center; padding: 10px 0 4px; }

  /* Label section */
  .label-textarea { width: 100%; background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text); padding: 7px 10px; font-size: 12px; font-family: var(--font-body); outline: none; transition: border-color .15s; resize: none; height: 72px; line-height: 1.55; }
  .label-textarea:focus { border-color: var(--accent); }
  .label-textarea::placeholder { color: var(--text-dim); }
  .char-count { font-size: 10px; color: var(--text-dim); text-align: right; margin-top: 3px; }

  .label-opts { display: flex; gap: 5px; margin-top: 8px; }
  .label-size-btn { flex: 1; padding: 4px 0; background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all .15s; font-family: var(--font-body); }
  .label-size-btn.active, .label-size-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* Label color row */
  .label-color-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .label-color-row label { font-size: 11px; color: var(--text-muted); flex: 1; }

  /* Font selector */
  .font-select-wrap { margin-top: 8px; }
  .font-select-wrap label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 5px; }
  #font-select { width: 100%; background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text); padding: 5px 8px; font-size: 12px; outline: none; cursor: pointer; transition: border-color .15s; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%237a7672' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 8px center; }
  #font-select:focus { border-color: var(--accent); }
  #font-select option { font-size: 13px; background: #1e1e1e; }

  /* Label position selector */
  .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; width: 96px; margin: 8px auto 0; }
  .pos-btn { width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--panel-border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; line-height: 1; }
  .pos-btn:hover { background: var(--surface2); border-color: var(--text-muted); }
  .pos-btn.active { background: var(--accent); border-color: var(--accent); }
  .pos-btn.center-dot { background: none; border: none; cursor: default; font-size: 10px; color: var(--text-dim); }
  .pos-label-hint { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 5px; }

  /* Line style */
  .line-style-row { display: flex; gap: 5px; margin-top: 8px; }
  .line-style-btn { flex: 1; padding: 4px 0; background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; font-size: 10px; transition: all .15s; font-family: var(--font-body); text-align: center; }
  .line-style-btn.active, .line-style-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* Ball list */
  .ball-list-label { padding: 9px 16px 3px; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); font-weight: 500; flex-shrink: 0; }
  #ball-list-wrap { flex: 1; overflow-y: auto; padding: 0 0 8px; min-height: 60px; }
  #ball-list-wrap::-webkit-scrollbar { width: 4px; }
  #ball-list-wrap::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .ball-item { display: flex; align-items: center; gap: 7px; padding: 6px 16px; cursor: pointer; transition: background .1s; border-left: 2px solid transparent; }
  .ball-item:hover { background: var(--surface); }
  .ball-item.selected { background: var(--surface); border-left-color: var(--accent); }
  .ball-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .ball-name { flex: 1; font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ball-size-text { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .ball-del { width: 17px; height: 17px; border-radius: 3px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: color .15s, background .15s; line-height: 1; flex-shrink: 0; }
  .ball-del:hover { color: var(--accent-light); background: rgba(231,76,60,.1); }
  .ball-list-empty { padding: 14px 16px; font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.6; }

  /* Toolbar */
  .tb-btn { height: 28px; padding: 0 11px; border-radius: var(--radius); border: 1px solid var(--panel-border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; font-family: var(--font-body); display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: all .15s; }
  .tb-btn:hover { border-color: var(--text-muted); background: var(--surface2); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .tb-btn.danger:hover { border-color: var(--accent); color: var(--accent-light); }
  .tb-btn:disabled { opacity: .35; cursor: not-allowed; }
  .tb-sep { width: 1px; height: 20px; background: var(--panel-border); margin: 0 3px; }
  .tb-file-info { font-size: 11px; color: var(--text-muted); margin-left: 3px; }
  .tb-spacer { flex: 1; }
  .export-wrap { display: flex; gap: 4px; }
  .fmt-btn { height: 28px; padding: 0 8px; border-radius: var(--radius); border: 1px solid var(--panel-border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-size: 11px; font-family: var(--font-body); transition: all .15s; }
  .fmt-btn.active { border-color: var(--accent); color: var(--text); background: var(--surface2); }
  .fmt-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .zoom-info { font-size: 11px; color: var(--text-dim); margin-right: 6px; }

  /* Drop overlay & toast */
  #drop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; flex-direction: column; gap: 12px; }
  #drop-overlay.active { opacity: 1; pointer-events: all; }
  #drop-overlay p { font-size: 20px; color: var(--text); font-family: var(--font-display); }
  #drop-overlay small { font-size: 13px; color: var(--text-muted); }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--panel-border); border-radius: var(--radius); padding: 7px 15px; font-size: 12px; color: var(--text); opacity: 0; transition: opacity .2s, transform .2s; z-index: 200; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Welcome */
  #welcome { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; pointer-events: none; }
  #welcome h2 { font-family: var(--font-display); font-size: 20px; color: var(--text-dim); font-weight: 400; }
  #welcome p { font-size: 13px; color: var(--text-dim); }
  #welcome .welcome-icon { font-size: 44px; opacity: .18; }
</style>
</head>
<body>
<div id="drop-overlay">
  <p>放開以載入影像</p><small>支援 JPG、PNG、WebP</small>
</div>
<div id="toast"></div>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>針灸<span>定位</span>編輯器</h1>
      <p>ACUPUNCTURE POINT EDITOR</p>
    </div>
    <div class="sidebar-body">

      <!-- Ball color -->
      <div class="s-section">
        <div class="s-label">圓球顏色</div>
        <div class="color-grid" id="color-grid"></div>
        <div class="custom-color-row">
          <label>自訂顏色</label>
          <input type="color" id="custom-color" class="color-picker-btn" value="#c0392b">
        </div>
      </div>

      <!-- Ball preview + size/opacity -->
      <div class="s-section">
        <div class="s-label">圓球設定</div>
        <div id="ball-preview-wrap">
          <canvas id="ball-preview" width="60" height="60"></canvas>
        </div>
        <div class="slider-row" style="margin-top:10px">
          <label>大小</label>
          <input type="range" id="size-slider" min="4" max="80" value="18">
          <span id="size-val">18</span>
        </div>
        <div class="slider-row" style="margin-top:7px">
          <label>透明</label>
          <input type="range" id="opacity-slider" min="20" max="100" value="100">
          <span id="opacity-val">100%</span>
        </div>
      </div>

      <!-- Label section -->
      <div class="s-section">
        <div class="s-label">穴位標籤</div>
        <!-- Textarea with Shift+Enter newline -->
        <textarea id="label-input" class="label-textarea"
          placeholder="輸入穴位名稱（可空白）&#10;Shift+Enter 換行，最多100字"
          maxlength="100"></textarea>
        <div class="char-count"><span id="char-count">0</span> / 100</div>

        <!-- Font size slider -->
        <div class="slider-row" style="margin-top:8px">
          <label>字級</label>
          <input type="range" id="font-size-slider" min="10" max="48" value="14">
          <span id="font-size-val">14px</span>
        </div>

        <!-- Text color -->
        <div class="label-color-row">
          <label>文字顏色</label>
          <input type="color" id="label-color" class="color-picker-btn" value="#ffffff">
        </div>

        <!-- Font family -->
        <div class="font-select-wrap">
          <label>文字字型</label>
          <select id="font-select">
            <option value="'Noto Serif TC', serif"       data-preview="Noto Serif TC">思源宋體（Noto Serif TC）</option>
            <option value="'Noto Sans TC', sans-serif"   data-preview="Noto Sans TC">思源黑體（Noto Sans TC）</option>
            <option value="'LXGW WenKai TC', cursive"   data-preview="LXGW WenKai TC">霞鶩文楷（WenKai TC）</option>
            <option value="'Ma Shan Zheng', cursive"    data-preview="Ma Shan Zheng">馬善政毛筆楷書</option>
            <option value="'Zhi Mang Xing', cursive"    data-preview="Zhi Mang Xing">芝芒行書</option>
            <option value="'Kaisei Tokumin', serif"      data-preview="Kaisei Tokumin">Kaisei Tokumin</option>
          </select>
        </div>

        <!-- Label position -->
        <div style="margin-top:10px">
          <div class="s-label" style="margin-bottom:4px">標籤位置</div>
          <div class="pos-grid" id="pos-grid">
            <!-- row 1 -->
            <button class="pos-btn" data-pos="top-left"    title="左上">↖</button>
            <button class="pos-btn active" data-pos="top"  title="上方">↑</button>
            <button class="pos-btn" data-pos="top-right"   title="右上">↗</button>
            <!-- row 2 -->
            <button class="pos-btn" data-pos="left"        title="左方">←</button>
            <div class="pos-btn center-dot">●</div>
            <button class="pos-btn" data-pos="right"       title="右方">→</button>
            <!-- row 3 -->
            <button class="pos-btn" data-pos="bottom-left" title="左下">↙</button>
            <button class="pos-btn" data-pos="bottom"      title="下方">↓</button>
            <button class="pos-btn" data-pos="bottom-right" title="右下">↘</button>
          </div>
          <div class="pos-label-hint" id="pos-hint">上方</div>
        </div>

        <!-- Indicator line style -->
        <div style="margin-top:8px">
          <div class="s-label" style="margin-bottom:4px">指示線樣式</div>
          <div class="line-style-row">
            <button class="line-style-btn active" data-lstyle="solid">實線</button>
            <button class="line-style-btn" data-lstyle="dashed">虛線</button>
            <button class="line-style-btn" data-lstyle="none">無線</button>
          </div>
        </div>

        <!-- Indicator line width -->
        <div class="slider-row" style="margin-top:8px">
          <label>線粗</label>
          <input type="range" id="line-width-slider" min="2" max="12" value="2">
          <span id="line-width-val">2px</span>
        </div>

        <!-- Indicator line color -->
        <div class="label-color-row" style="margin-top:6px">
          <label>線條顏色</label>
          <input type="color" id="line-color" class="color-picker-btn" value="#ffffff">
        </div>

        <!-- Label gap -->
        <div class="slider-row" style="margin-top:8px">
          <label>距離</label>
          <input type="range" id="label-gap-slider" min="10" max="100" value="20">
          <span id="label-gap-val">20px</span>
        </div>
      </div>

      <!-- Ball list -->
      <div class="ball-list-label">已放置圓球</div>
      <div id="ball-list-wrap">
        <div class="ball-list-empty" id="ball-list-empty">尚未放置任何圓球<br>點擊影像開始標記</div>
        <div id="ball-list"></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="toolbar">
      <button class="tb-btn" id="load-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        載入影像
      </button>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <span class="tb-file-info" id="file-info">尚未載入</span>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="undo-btn" title="Ctrl+Z" disabled>↩ 復原</button>
      <button class="tb-btn" id="redo-btn" title="Ctrl+Y" disabled>↪ 重做</button>
      <div class="tb-sep"></div>
      <button class="tb-btn danger" id="clear-btn">清除全部</button>
      <div class="tb-spacer"></div>
      <span class="zoom-info" id="zoom-info"></span>
      <div class="export-wrap">
        <button class="fmt-btn active" data-fmt="png">PNG</button>
        <button class="fmt-btn" data-fmt="jpeg">JPEG</button>
        <button class="fmt-btn" data-fmt="webp">WebP</button>
      </div>
      <button class="tb-btn primary" id="export-btn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        匯出影像
      </button>
    </div>
    <div id="canvas-area">
      <div id="welcome">
        <div class="welcome-icon">⊕</div>
        <h2>載入影像以開始標記</h2>
        <p>點擊「載入影像」或直接拖曳圖片至此處</p>
      </div>
      <div id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
const state = {
  img: null, imgW: 0, imgH: 0,
  balls: [], selectedId: null,
  // ball defaults
  color: '#c0392b', size: 18, opacity: 1.0,
  // label defaults
  labelText: '', labelFontSize: 14, labelColor: '#ffffff',
  labelFont: "'Noto Serif TC', serif",
  labelPos: 'top',
  labelGap: 20,          // px distance from ball edge to label box
  lineStyle: 'solid',
  lineWidth: 2,          // px indicator line width
  lineColor: '#ffffff',  // indicator line color
  // app
  exportFmt: 'png', history: [], historyIdx: -1,
  dpr: window.devicePixelRatio || 1, scale: 1,
  dragId: null, dragOffX: 0, dragOffY: 0,
};
let nextId = 1;

// ── DOM ──
const canvas  = document.getElementById('main-canvas');
const ctx     = canvas.getContext('2d');
const prevCvs = document.getElementById('ball-preview');
const prevCtx = prevCvs.getContext('2d');
const fileInput     = document.getElementById('file-input');
const sizeSlider    = document.getElementById('size-slider');
const sizeVal       = document.getElementById('size-val');
const opacitySlider = document.getElementById('opacity-slider');
const opacityVal    = document.getElementById('opacity-val');
const labelInput    = document.getElementById('label-input');
const charCount     = document.getElementById('char-count');
const ballList      = document.getElementById('ball-list');
const ballListEmpty = document.getElementById('ball-list-empty');
const undoBtn       = document.getElementById('undo-btn');
const redoBtn       = document.getElementById('redo-btn');
const exportBtn     = document.getElementById('export-btn');
const zoomInfo      = document.getElementById('zoom-info');
const welcome       = document.getElementById('welcome');
const canvasArea    = document.getElementById('canvas-area');

// ── Preset colors ──
const PRESET_COLORS = [
  '#c0392b','#e74c3c','#ff6b6b',
  '#e67e22','#f39c12','#f1c40f',
  '#27ae60','#16a085','#2980b9',
  '#8e44ad','#2c3e50','#ffffff',
];
function initColorGrid() {
  const grid = document.getElementById('color-grid');
  PRESET_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === state.color ? ' active' : '');
    s.style.background = c;
    s.style.border = c === '#ffffff' ? '2px solid #555' : '';
    s.onclick = () => setColor(c);
    grid.appendChild(s);
  });
}
function setColor(c) {
  state.color = c;
  document.getElementById('custom-color').value = c;
  document.querySelectorAll('.color-swatch').forEach((s, i) => {
    s.classList.toggle('active', PRESET_COLORS[i] === c);
  });
  drawPreview();
}

// ── 3D Ball renderer ──
function draw3DBall(ctx2, cx, cy, r, hexColor, alpha) {
  if (r < 1) return;
  alpha = (alpha === undefined) ? 1 : alpha;
  ctx2.save(); ctx2.globalAlpha = alpha;
  const br = parseInt(hexColor.slice(1,3),16);
  const bg = parseInt(hexColor.slice(3,5),16);
  const bb = parseInt(hexColor.slice(5,7),16);
  // shadow
  ctx2.beginPath();
  ctx2.ellipse(cx, cy + r*0.85, r*0.8, r*0.22, 0, 0, Math.PI*2);
  const shG = ctx2.createRadialGradient(cx, cy+r*0.85, 0, cx, cy+r*0.85, r*0.8);
  shG.addColorStop(0,'rgba(0,0,0,0.38)'); shG.addColorStop(1,'rgba(0,0,0,0)');
  ctx2.fillStyle = shG; ctx2.fill();
  // body
  const bG = ctx2.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.05, cx, cy, r);
  bG.addColorStop(0, `rgba(${Math.min(255,br+90)},${Math.min(255,bg+90)},${Math.min(255,bb+90)},1)`);
  bG.addColorStop(0.45, `rgba(${br},${bg},${bb},1)`);
  bG.addColorStop(1, `rgba(${Math.max(0,br-80)},${Math.max(0,bg-80)},${Math.max(0,bb-80)},1)`);
  ctx2.beginPath(); ctx2.arc(cx, cy, r, 0, Math.PI*2);
  ctx2.fillStyle = bG; ctx2.fill();
  // specular
  const sG = ctx2.createRadialGradient(cx-r*0.32, cy-r*0.32, 0, cx-r*0.32, cy-r*0.32, r*0.38);
  sG.addColorStop(0,'rgba(255,255,255,0.88)'); sG.addColorStop(0.35,'rgba(255,255,255,0.28)'); sG.addColorStop(1,'rgba(255,255,255,0)');
  ctx2.beginPath(); ctx2.arc(cx, cy, r, 0, Math.PI*2);
  ctx2.fillStyle = sG; ctx2.fill();
  // rim
  const rG = ctx2.createRadialGradient(cx+r*0.5, cy+r*0.5, 0, cx+r*0.5, cy+r*0.5, r*0.3);
  rG.addColorStop(0,'rgba(255,255,255,0.25)'); rG.addColorStop(1,'rgba(255,255,255,0)');
  ctx2.beginPath(); ctx2.arc(cx, cy, r, 0, Math.PI*2);
  ctx2.fillStyle = rG; ctx2.fill();
  ctx2.restore();
}

// ── Label + indicator line renderer ──
// Returns the anchor point on the ball edge and the label box origin
function getLabelLayout(b, scale) {
  const cx = b.x * scale, cy = b.y * scale, r = b.size * scale;
  const gap = (b.labelGap || 20) * scale;   // user-defined gap between ball edge and label
  const pos = b.labelPos || 'top';

  // Direction vector from center outward
  const DIR = {
    'top':          [0, -1], 'bottom':       [0,  1],
    'left':         [-1, 0], 'right':        [ 1, 0],
    'top-left':     [-0.707,-0.707], 'top-right':    [ 0.707,-0.707],
    'bottom-left':  [-0.707, 0.707], 'bottom-right': [ 0.707, 0.707],
  };
  const [dx, dy] = DIR[pos] || [0, -1];

  // Ball edge point (where line starts)
  const edgeX = cx + dx * r;
  const edgeY = cy + dy * r;

  // Text box anchor point (where line ends, plus gap)
  const anchorX = cx + dx * (r + gap);
  const anchorY = cy + dy * (r + gap);

  return { cx, cy, r, dx, dy, edgeX, edgeY, anchorX, anchorY, gap };
}

// Draw multi-line label text (transparent bg) + indicator line
function drawLabel(ctx2, b, scale) {
  if (!b.label && b.label !== '0') return;
  const text = b.label;
  if (!text) return;

  const fs = (b.fontSize || 14) * scale;
  const color = b.labelColor || '#ffffff';
  const lineStyle = b.lineStyle || 'solid';
  const lineColor = b.lineColor || '#ffffff';
  const lineWidth = (b.lineWidth || 2) * scale;
  const fontFamily = b.labelFont || "'Noto Serif TC', serif";
  const layout = getLabelLayout(b, scale);
  const { dx, dy, edgeX, edgeY, anchorX, anchorY } = layout;
  const pos = b.labelPos || 'top';

  // Prepare font
  const fontStr = `${fs}px ${fontFamily}`;
  ctx2.font = fontStr;
  ctx2.textBaseline = 'top';

  // Split into lines
  const lines = text.split('\n');
  // 行距 = 字體大小 + 4px（固定間距，scale 補償）
  const lineGap = 4 * scale;
  const lineH = fs + lineGap;
  const maxW = Math.max(...lines.map(l => ctx2.measureText(l).width));
  const totalH = lines.length * fs + (lines.length - 1) * lineGap;

  // Compute text box top-left based on position
  let boxX, boxY;
  if (pos === 'right' || pos === 'top-right' || pos === 'bottom-right') {
    boxX = anchorX;
  } else if (pos === 'left' || pos === 'top-left' || pos === 'bottom-left') {
    boxX = anchorX - maxW;
  } else {
    boxX = anchorX - maxW / 2;
  }
  if (pos === 'bottom' || pos === 'bottom-left' || pos === 'bottom-right') {
    boxY = anchorY;
  } else if (pos === 'top' || pos === 'top-left' || pos === 'top-right') {
    boxY = anchorY - totalH;
  } else {
    boxY = anchorY - totalH / 2;
  }

  // ── Draw indicator line ──
  if (lineStyle !== 'none') {
    let lineEndX = boxX + maxW / 2;
    let lineEndY = boxY + totalH / 2;
    if (pos === 'top')          { lineEndX = boxX + maxW/2; lineEndY = boxY + totalH; }
    if (pos === 'bottom')       { lineEndX = boxX + maxW/2; lineEndY = boxY; }
    if (pos === 'left')         { lineEndX = boxX + maxW;   lineEndY = boxY + totalH/2; }
    if (pos === 'right')        { lineEndX = boxX;          lineEndY = boxY + totalH/2; }
    if (pos === 'top-left')     { lineEndX = boxX + maxW;   lineEndY = boxY + totalH; }
    if (pos === 'top-right')    { lineEndX = boxX;          lineEndY = boxY + totalH; }
    if (pos === 'bottom-left')  { lineEndX = boxX + maxW;   lineEndY = boxY; }
    if (pos === 'bottom-right') { lineEndX = boxX;          lineEndY = boxY; }

    ctx2.save();
    ctx2.strokeStyle = lineColor;
    ctx2.lineWidth = lineWidth;
    if (lineStyle === 'dashed') {
      ctx2.setLineDash([4 * scale, 3 * scale]);
    } else {
      ctx2.setLineDash([]);
    }
    ctx2.globalAlpha = 0.75;
    ctx2.beginPath();
    ctx2.moveTo(edgeX, edgeY);
    ctx2.lineTo(lineEndX, lineEndY);
    ctx2.stroke();
    ctx2.setLineDash([]);
    ctx2.restore();
  }

  // ── Draw text ──
  ctx2.save();
  ctx2.font = fontStr;
  ctx2.textBaseline = 'top';
  ctx2.fillStyle = color;
  ctx2.shadowColor = 'rgba(0,0,0,0.85)';
  ctx2.shadowBlur = Math.max(3, 4 * scale);
  ctx2.shadowOffsetX = 0;
  ctx2.shadowOffsetY = 0;
  lines.forEach((line, i) => {
    ctx2.fillText(line, boxX, boxY + i * lineH);
  });
  ctx2.restore();
}

// ── Preview ──
function drawPreview() {
  const dpr = state.dpr;
  prevCvs.width = 60 * dpr; prevCvs.height = 60 * dpr;
  prevCvs.style.width = '60px'; prevCvs.style.height = '60px';
  prevCtx.scale(dpr, dpr);
  prevCtx.clearRect(0, 0, 60, 60);
  const r = Math.min(state.size * 1.2, 26);
  draw3DBall(prevCtx, 30, 30, r, state.color, state.opacity);
}

// ── Canvas setup ──
function setupCanvas(img) {
  state.img = img; state.imgW = img.naturalWidth; state.imgH = img.naturalHeight;
  welcome.style.display = 'none';
  const area = canvasArea.getBoundingClientRect();
  const maxW = area.width - 40, maxH = area.height - 40;
  state.scale = Math.min(1, maxW / state.imgW, maxH / state.imgH);
  const dispW = Math.round(state.imgW * state.scale);
  const dispH = Math.round(state.imgH * state.scale);
  canvas.style.width  = dispW + 'px';
  canvas.style.height = dispH + 'px';
  canvas.width  = dispW * state.dpr;
  canvas.height = dispH * state.dpr;
  ctx.scale(state.dpr, state.dpr);
  zoomInfo.textContent = state.imgW + '×' + state.imgH + 'px  |  ' + Math.round(state.scale*100) + '%';
  redraw();
  exportBtn.disabled = false;
  document.getElementById('file-info').textContent = state.imgW + ' × ' + state.imgH;
}

// ── Redraw ──
function redraw() {
  if (!state.img) return;
  const dW = canvas.width / state.dpr, dH = canvas.height / state.dpr;
  ctx.clearRect(0, 0, dW, dH);
  ctx.drawImage(state.img, 0, 0, dW, dH);
  state.balls.forEach(b => {
    const cx = b.x * state.scale, cy = b.y * state.scale, r = b.size * state.scale;
    // selection ring
    if (b.id === state.selectedId) {
      ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    }
    draw3DBall(ctx, cx, cy, r, b.color, b.opacity);
    drawLabel(ctx, b, state.scale);
  });
}

// ── Mouse helpers ──
function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / state.scale, y: (e.clientY - rect.top) / state.scale };
}
function hitTest(x, y) {
  for (let i = state.balls.length - 1; i >= 0; i--) {
    const b = state.balls[i];
    const dx = x - b.x, dy = y - b.y;
    if (Math.sqrt(dx*dx+dy*dy) <= b.size) return b;
  }
  return null;
}

// ── Canvas events ──
canvas.addEventListener('mousedown', e => {
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  const hit = hitTest(x, y);
  if (hit) {
    state.dragId = hit.id; state.selectedId = hit.id;
    state.dragOffX = x - hit.x; state.dragOffY = y - hit.y;
    updateBallList(); redraw(); e.preventDefault();
  } else {
    // place new ball
    const ball = {
      id: nextId++, x, y,
      size: state.size, color: state.color, opacity: state.opacity,
      label: state.labelText, fontSize: state.labelFontSize,
      labelColor: state.labelColor, labelFont: state.labelFont,
      labelPos: state.labelPos, labelGap: state.labelGap,
      lineStyle: state.lineStyle, lineWidth: state.lineWidth, lineColor: state.lineColor,
    };
    state.balls.push(ball);
    state.selectedId = ball.id;
    pushHistory(); updateBallList(); redraw();
  }
});
canvas.addEventListener('mousemove', e => {
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  if (state.dragId !== null) {
    const b = state.balls.find(b => b.id === state.dragId);
    if (b) { b.x = x - state.dragOffX; b.y = y - state.dragOffY; redraw(); }
  } else {
    canvas.style.cursor = hitTest(x, y) ? 'move' : 'crosshair';
  }
});
canvas.addEventListener('mouseup',    () => { if (state.dragId !== null) { pushHistory(); state.dragId = null; } });
canvas.addEventListener('mouseleave', () => { if (state.dragId !== null) { pushHistory(); state.dragId = null; } });
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  const hit = hitTest(x, y);
  if (hit) {
    state.balls = state.balls.filter(b => b.id !== hit.id);
    if (state.selectedId === hit.id) state.selectedId = null;
    pushHistory(); updateBallList(); redraw(); showToast('已刪除圓球');
  }
});

// ── Ball list ──
function updateBallList() {
  ballListEmpty.style.display = state.balls.length === 0 ? '' : 'none';
  ballList.innerHTML = '';
  [...state.balls].reverse().forEach(b => {
    const div = document.createElement('div');
    div.className = 'ball-item' + (b.id === state.selectedId ? ' selected' : '');
    const labelDisplay = b.label ? b.label.replace(/\n/g, ' ') : '（無標籤）';
    div.innerHTML =
      '<div class="ball-dot" style="background:' + b.color + '"></div>' +
      '<div class="ball-name" title="' + labelDisplay + '">' + labelDisplay + '</div>' +
      '<div class="ball-size-text">' + b.size + 'px</div>' +
      '<button class="ball-del" title="刪除">×</button>';
    div.addEventListener('click', ev => {
      if (ev.target.classList.contains('ball-del')) {
        state.balls = state.balls.filter(x => x.id !== b.id);
        if (state.selectedId === b.id) state.selectedId = null;
        pushHistory(); updateBallList(); redraw();
      } else {
        state.selectedId = b.id; updateBallList(); redraw();
      }
    });
    ballList.appendChild(div);
  });
}

// ── History ──
function pushHistory() {
  const snap = JSON.stringify(state.balls.map(b => Object.assign({}, b)));
  state.history = state.history.slice(0, state.historyIdx + 1);
  state.history.push(snap);
  state.historyIdx = state.history.length - 1;
  updateHistoryBtns();
}
function undo() {
  if (state.historyIdx <= 0) return;
  state.historyIdx--;
  state.balls = JSON.parse(state.history[state.historyIdx]);
  state.selectedId = null; updateBallList(); redraw(); updateHistoryBtns();
}
function redo() {
  if (state.historyIdx >= state.history.length - 1) return;
  state.historyIdx++;
  state.balls = JSON.parse(state.history[state.historyIdx]);
  state.selectedId = null; updateBallList(); redraw(); updateHistoryBtns();
}
function updateHistoryBtns() {
  undoBtn.disabled = state.historyIdx <= 0;
  redoBtn.disabled = state.historyIdx >= state.history.length - 1;
}
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;

// ── Controls ──
sizeSlider.addEventListener('input', () => { state.size = parseInt(sizeSlider.value); sizeVal.textContent = state.size; drawPreview(); });
opacitySlider.addEventListener('input', () => { state.opacity = parseInt(opacitySlider.value)/100; opacityVal.textContent = opacitySlider.value + '%'; drawPreview(); });

// ── Load ──
document.getElementById('load-btn').onclick = () => fileInput.click();
fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f); fileInput.value = ''; });
function loadFile(file) {
  if (!file.type.startsWith('image/')) { showToast('請選擇圖片檔案'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    state.balls = []; state.history = []; state.historyIdx = -1; state.selectedId = null;
    pushHistory(); setupCanvas(img); updateBallList(); showToast('已載入：' + file.name);
  };
  img.src = url;
}

// ── Drag & drop ──
const dropOverlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', e => { e.preventDefault(); dropOverlay.classList.remove('active'); const f = e.dataTransfer.files[0]; if (f) loadFile(f); });

// ── Export ──
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); state.exportFmt = btn.dataset.fmt;
  });
});
document.getElementById('export-btn').onclick = () => {
  if (!state.img) return;
  const off = document.createElement('canvas');
  off.width = state.imgW; off.height = state.imgH;
  const offCtx = off.getContext('2d');
  offCtx.drawImage(state.img, 0, 0, state.imgW, state.imgH);
  // render balls at 1:1 scale (no scale factor)
  state.balls.forEach(b => {
    draw3DBall(offCtx, b.x, b.y, b.size, b.color, b.opacity);
    // draw label at scale=1
    const saved = b;
    drawLabel(offCtx, b, 1);
  });
  const mime = {png:'image/png', jpeg:'image/jpeg', webp:'image/webp'}[state.exportFmt];
  const quality = state.exportFmt === 'png' ? undefined : 0.92;
  const a = document.createElement('a');
  a.href = off.toDataURL(mime, quality);
  a.download = 'acupuncture_' + Date.now() + '.' + state.exportFmt;
  a.click();
  showToast('已匯出 ' + state.exportFmt.toUpperCase() + '（' + state.imgW + '×' + state.imgH + '）');
};

// ── Clear ──
document.getElementById('clear-btn').onclick = () => {
  if (!state.balls.length) return;
  state.balls = []; state.selectedId = null;
  pushHistory(); updateBallList(); redraw(); showToast('已清除所有圓球');
};

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId !== null) {
    state.balls = state.balls.filter(b => b.id !== state.selectedId);
    state.selectedId = null;
    pushHistory(); updateBallList(); redraw();
  }
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──
initColorGrid(); drawPreview(); pushHistory();
</script>
