<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>針灸定位影像編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --panel: #161616; --panel-border: #2a2a2a;
    --surface: #1e1e1e; --surface2: #272727;
    --accent: #c0392b; --accent-light: #e74c3c; --accent-glow: rgba(192,57,43,0.25);
    --text: #e8e4dc; --text-muted: #7a7672; --text-dim: #4a4846;
    --radius: 6px; --font-body: 'Noto Sans TC', sans-serif; --font-display: 'Noto Serif TC', serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 13px; overflow: hidden; }
  #app { display: flex; height: 100vh; }
  #sidebar { width: 240px; min-width: 240px; background: var(--panel); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; overflow: hidden; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #toolbar { height: 44px; background: var(--panel); border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; gap: 6px; padding: 0 12px; flex-shrink: 0; }
  #canvas-area { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: #080808; background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px); background-size: 24px 24px; cursor: crosshair; position: relative; }
  #canvas-wrapper { position: relative; display: inline-block; line-height: 0; }
  #main-canvas { display: block; max-width: 100%; max-height: calc(100vh - 44px); cursor: crosshair; }
  .sidebar-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--panel-border); }
  .sidebar-logo h1 { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .05em; line-height: 1.4; }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-logo p { font-size: 10px; color: var(--text-muted); margin-top: 3px; letter-spacing: .08em; }
  .s-section { padding: 14px 16px; border-bottom: 1px solid var(--panel-border); }
  .s-label { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; font-weight: 500; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #fff; transform: scale(1.15); }
  .custom-color-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .custom-color-row label { font-size: 11px; color: var(--text-muted); flex: 1; }
  #custom-color { width: 36px; height: 24px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-size: 11px; color: var(--text-muted); width: 24px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; background: var(--surface2); border-radius: 2px; outline: none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-light); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 6px var(--accent-glow); }
  .slider-row span { font-size: 11px; color: var(--text); width: 32px; text-align: right; }
  #ball-preview-wrap { display: flex; align-items: center; justify-content: center; padding: 12px 0 4px; }
  #ball-preview { display: block; }
  .label-row { display: flex; flex-direction: column; gap: 6px; }
  .label-row input { background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text); padding: 7px 10px; font-size: 12px; font-family: var(--font-body); outline: none; transition: border-color .15s; width: 100%; }
  .label-row input:focus { border-color: var(--accent); }
  .label-row input::placeholder { color: var(--text-dim); }
  .label-opts { display: flex; gap: 6px; }
  .label-size-btn { flex: 1; padding: 5px 0; background: var(--surface); border: 1px solid var(--panel-border); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all .15s; font-family: var(--font-body); }
  .label-size-btn.active, .label-size-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  #ball-list-wrap { flex: 1; overflow-y: auto; padding: 0 0 8px; }
  #ball-list-wrap::-webkit-scrollbar { width: 4px; }
  #ball-list-wrap::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .ball-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer; transition: background .1s; border-left: 2px solid transparent; }
  .ball-item:hover { background: var(--surface); }
  .ball-item.selected { background: var(--surface); border-left-color: var(--accent); }
  .ball-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .ball-name { flex: 1; font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ball-size-text { font-size: 10px; color: var(--text-dim); }
  .ball-del { width: 18px; height: 18px; border-radius: 3px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: color .15s, background .15s; line-height: 1; flex-shrink: 0; }
  .ball-del:hover { color: var(--accent-light); background: rgba(231,76,60,.1); }
  .ball-list-label { padding: 10px 16px 4px; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); font-weight: 500; }
  .ball-list-empty { padding: 16px; font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.6; }
  .tb-btn { height: 28px; padding: 0 12px; border-radius: var(--radius); border: 1px solid var(--panel-border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; font-family: var(--font-body); display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: all .15s; }
  .tb-btn:hover { border-color: var(--text-muted); background: var(--surface2); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .tb-btn.danger:hover { border-color: var(--accent); color: var(--accent-light); }
  .tb-btn:disabled { opacity: .35; cursor: not-allowed; }
  .tb-sep { width: 1px; height: 20px; background: var(--panel-border); margin: 0 4px; }
  .tb-file-info { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
  .tb-spacer { flex: 1; }
  .export-wrap { display: flex; gap: 4px; }
  .fmt-btn { height: 28px; padding: 0 8px; border-radius: var(--radius); border: 1px solid var(--panel-border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-size: 11px; font-family: var(--font-body); transition: all .15s; }
  .fmt-btn.active { border-color: var(--accent); color: var(--text); background: var(--surface2); }
  .fmt-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .zoom-info { font-size: 11px; color: var(--text-dim); margin-right: 8px; }
  #drop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; flex-direction: column; gap: 12px; }
  #drop-overlay.active { opacity: 1; pointer-events: all; }
  #drop-overlay p { font-size: 20px; color: var(--text); font-family: var(--font-display); }
  #drop-overlay small { font-size: 13px; color: var(--text-muted); }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--panel-border); border-radius: var(--radius); padding: 8px 16px; font-size: 12px; color: var(--text); opacity: 0; transition: opacity .2s, transform .2s; z-index: 200; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #welcome { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; pointer-events: none; }
  #welcome h2 { font-family: var(--font-display); font-size: 22px; color: var(--text-dim); font-weight: 400; }
  #welcome p { font-size: 13px; color: var(--text-dim); }
  #welcome .welcome-icon { font-size: 48px; opacity: .2; }
</style>
</head>
<body>
<div id="drop-overlay">
  <p>放開以載入影像</p>
  <small>支援 JPG、PNG、WebP</small>
</div>
<div id="toast"></div>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>針灸<span>定位</span>編輯器</h1>
      <p>ACUPUNCTURE POINT EDITOR</p>
    </div>
    <div class="s-section">
      <div class="s-label">圓球顏色</div>
      <div class="color-grid" id="color-grid"></div>
      <div class="custom-color-row">
        <label>自訂顏色</label>
        <input type="color" id="custom-color" value="#c0392b">
      </div>
    </div>
    <div class="s-section">
      <div class="s-label">圓球預覽</div>
      <div id="ball-preview-wrap">
        <canvas id="ball-preview" width="60" height="60"></canvas>
      </div>
      <div class="slider-row" style="margin-top:10px">
        <label>大小</label>
        <input type="range" id="size-slider" min="4" max="80" value="18">
        <span id="size-val">18</span>
      </div>
      <div class="slider-row" style="margin-top:8px">
        <label>透明</label>
        <input type="range" id="opacity-slider" min="20" max="100" value="100">
        <span id="opacity-val">100%</span>
      </div>
    </div>
    <div class="s-section">
      <div class="s-label">穴位標籤</div>
      <div class="label-row">
        <input type="text" id="label-input" placeholder="輸入穴位名稱（可空白）" maxlength="20">
        <div class="label-opts">
          <button class="label-size-btn active" data-fsize="13">小</button>
          <button class="label-size-btn" data-fsize="16">中</button>
          <button class="label-size-btn" data-fsize="20">大</button>
        </div>
      </div>
    </div>
    <div class="ball-list-label">已放置圓球</div>
    <div id="ball-list-wrap">
      <div class="ball-list-empty" id="ball-list-empty">尚未放置任何圓球<br>點擊影像開始標記</div>
      <div id="ball-list"></div>
    </div>
  </div>
  <div id="main">
    <div id="toolbar">
      <button class="tb-btn" id="load-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        載入影像
      </button>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <span class="tb-file-info" id="file-info">尚未載入</span>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="undo-btn" title="Ctrl+Z" disabled>↩ 復原</button>
      <button class="tb-btn" id="redo-btn" title="Ctrl+Y" disabled>↪ 重做</button>
      <div class="tb-sep"></div>
      <button class="tb-btn danger" id="clear-btn">清除全部</button>
      <div class="tb-spacer"></div>
      <span class="zoom-info" id="zoom-info"></span>
      <div class="export-wrap">
        <button class="fmt-btn active" data-fmt="png">PNG</button>
        <button class="fmt-btn" data-fmt="jpeg">JPEG</button>
        <button class="fmt-btn" data-fmt="webp">WebP</button>
      </div>
      <button class="tb-btn primary" id="export-btn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        匯出影像
      </button>
    </div>
    <div id="canvas-area">
      <div id="welcome">
        <div class="welcome-icon">⊕</div>
        <h2>載入影像以開始標記</h2>
        <p>點擊「載入影像」或直接拖曳圖片至此處</p>
      </div>
      <div id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
      </div>
    </div>
  </div>
</div>
<script>
const state = {
  img: null, imgW: 0, imgH: 0, balls: [], selectedId: null,
  color: '#c0392b', size: 18, opacity: 1.0, labelText: '', labelFontSize: 13,
  exportFmt: 'png', history: [], historyIdx: -1,
  dpr: window.devicePixelRatio || 1, scale: 1,
  dragId: null, dragOffX: 0, dragOffY: 0,
};
let nextId = 1;

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const previewCanvas = document.getElementById('ball-preview');
const previewCtx = previewCanvas.getContext('2d');
const fileInput = document.getElementById('file-input');
const sizeSlider = document.getElementById('size-slider');
const sizeVal = document.getElementById('size-val');
const opacitySlider = document.getElementById('opacity-slider');
const opacityVal = document.getElementById('opacity-val');
const labelInput = document.getElementById('label-input');
const ballList = document.getElementById('ball-list');
const ballListEmpty = document.getElementById('ball-list-empty');
const undoBtn = document.getElementById('undo-btn');
const redoBtn = document.getElementById('redo-btn');
const exportBtn = document.getElementById('export-btn');
const zoomInfo = document.getElementById('zoom-info');
const welcome = document.getElementById('welcome');
const canvasArea = document.getElementById('canvas-area');

const PRESET_COLORS = [
  '#c0392b','#e74c3c','#ff6b6b',
  '#e67e22','#f39c12','#f1c40f',
  '#27ae60','#16a085','#2980b9',
  '#8e44ad','#2c3e50','#ecf0f1',
];

function initColorGrid() {
  const grid = document.getElementById('color-grid');
  PRESET_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === state.color ? ' active' : '');
    s.style.background = c;
    s.onclick = () => setColor(c);
    grid.appendChild(s);
  });
}

function setColor(c) {
  state.color = c;
  document.getElementById('custom-color').value = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  const swatches = document.querySelectorAll('.color-swatch');
  PRESET_COLORS.forEach((pc, i) => { if (pc === c) swatches[i].classList.add('active'); });
  drawPreview();
}

document.getElementById('custom-color').addEventListener('input', e => {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  state.color = e.target.value;
  drawPreview();
});

function draw3DBall(ctx2, cx, cy, r, hexColor, alpha) {
  if (r < 1) return;
  alpha = alpha === undefined ? 1 : alpha;
  ctx2.save();
  ctx2.globalAlpha = alpha;
  const br = parseInt(hexColor.slice(1,3),16);
  const bg = parseInt(hexColor.slice(3,5),16);
  const bb = parseInt(hexColor.slice(5,7),16);

  // Drop shadow
  ctx2.beginPath();
  ctx2.ellipse(cx, cy + r * 0.85, r * 0.8, r * 0.22, 0, 0, Math.PI * 2);
  const shGrad = ctx2.createRadialGradient(cx, cy + r*0.85, 0, cx, cy + r*0.85, r*0.8);
  shGrad.addColorStop(0, 'rgba(0,0,0,0.38)');
  shGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx2.fillStyle = shGrad;
  ctx2.fill();

  // Body
  const bodyGrad = ctx2.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.05, cx, cy, r);
  bodyGrad.addColorStop(0, `rgba(${Math.min(255,br+90)},${Math.min(255,bg+90)},${Math.min(255,bb+90)},1)`);
  bodyGrad.addColorStop(0.45, `rgba(${br},${bg},${bb},1)`);
  bodyGrad.addColorStop(1, `rgba(${Math.max(0,br-80)},${Math.max(0,bg-80)},${Math.max(0,bb-80)},1)`);
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2.fillStyle = bodyGrad;
  ctx2.fill();

  // Specular highlight
  const hlx = cx - r*0.32, hly = cy - r*0.32;
  const specGrad = ctx2.createRadialGradient(hlx, hly, 0, hlx, hly, r*0.38);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.88)');
  specGrad.addColorStop(0.35, 'rgba(255,255,255,0.28)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2.fillStyle = specGrad;
  ctx2.fill();

  // Rim light
  const rimGrad = ctx2.createRadialGradient(cx+r*0.5, cy+r*0.5, 0, cx+r*0.5, cy+r*0.5, r*0.3);
  rimGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
  rimGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2.fillStyle = rimGrad;
  ctx2.fill();
  ctx2.restore();
}

function drawPreview() {
  const dpr = state.dpr;
  previewCanvas.width = 60 * dpr; previewCanvas.height = 60 * dpr;
  previewCanvas.style.width = '60px'; previewCanvas.style.height = '60px';
  previewCtx.scale(dpr, dpr);
  previewCtx.clearRect(0, 0, 60, 60);
  const r = Math.min(state.size * 1.2, 26);
  draw3DBall(previewCtx, 30, 30, r, state.color, state.opacity);
}

function setupCanvas(img) {
  state.img = img;
  state.imgW = img.naturalWidth;
  state.imgH = img.naturalHeight;
  welcome.style.display = 'none';
  const area = canvasArea.getBoundingClientRect();
  const maxW = area.width - 40, maxH = area.height - 40;
  state.scale = Math.min(1, maxW / state.imgW, maxH / state.imgH);
  const dispW = Math.round(state.imgW * state.scale);
  const dispH = Math.round(state.imgH * state.scale);
  canvas.style.width = dispW + 'px';
  canvas.style.height = dispH + 'px';
  canvas.width = dispW * state.dpr;
  canvas.height = dispH * state.dpr;
  ctx.scale(state.dpr, state.dpr);
  zoomInfo.textContent = state.imgW + '\xd7' + state.imgH + 'px  |  縮放 ' + Math.round(state.scale*100) + '%';
  redraw();
  exportBtn.disabled = false;
  document.getElementById('file-info').textContent = state.imgW + ' \xd7 ' + state.imgH;
}

function roundRect(ctx2, x, y, w, h, r2) {
  ctx2.beginPath();
  ctx2.moveTo(x+r2, y);
  ctx2.lineTo(x+w-r2, y);
  ctx2.quadraticCurveTo(x+w, y, x+w, y+r2);
  ctx2.lineTo(x+w, y+h-r2);
  ctx2.quadraticCurveTo(x+w, y+h, x+w-r2, y+h);
  ctx2.lineTo(x+r2, y+h);
  ctx2.quadraticCurveTo(x, y+h, x, y+h-r2);
  ctx2.lineTo(x, y+r2);
  ctx2.quadraticCurveTo(x, y, x+r2, y);
  ctx2.closePath();
}

function drawLabel(ctx2, b, scale) {
  if (!b.label) return;
  const fs = b.fontSize * scale;
  ctx2.font = fs + "px 'Noto Serif TC', serif";
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'top';
  const cx = b.x * scale, cy = b.y * scale, r = b.size * scale;
  const lx = cx, ly = cy + r + 4 * scale;
  const tw = ctx2.measureText(b.label).width;
  const pad = 4 * scale;
  ctx2.fillStyle = 'rgba(0,0,0,0.65)';
  roundRect(ctx2, lx - tw/2 - pad, ly - pad/2, tw + pad*2, fs + pad, 3 * scale);
  ctx2.fill();
  ctx2.fillStyle = '#ffffff';
  ctx2.fillText(b.label, lx, ly);
}

function redraw() {
  if (!state.img) return;
  const dispW = canvas.width / state.dpr;
  const dispH = canvas.height / state.dpr;
  ctx.clearRect(0, 0, dispW, dispH);
  ctx.drawImage(state.img, 0, 0, dispW, dispH);
  state.balls.forEach(b => {
    const cx = b.x * state.scale, cy = b.y * state.scale, r = b.size * state.scale;
    if (b.id === state.selectedId) {
      ctx.beginPath();
      ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4,3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    draw3DBall(ctx, cx, cy, r, b.color, b.opacity);
    drawLabel(ctx, b, state.scale);
  });
}

function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / state.scale, y: (e.clientY - rect.top) / state.scale };
}

function hitTest(x, y) {
  for (let i = state.balls.length - 1; i >= 0; i--) {
    const b = state.balls[i];
    const dx = x - b.x, dy = y - b.y;
    if (Math.sqrt(dx*dx+dy*dy) <= b.size) return b;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  const hit = hitTest(x, y);
  if (hit) {
    state.dragId = hit.id; state.selectedId = hit.id;
    state.dragOffX = x - hit.x; state.dragOffY = y - hit.y;
    updateBallList(); redraw(); e.preventDefault();
  } else {
    const ball = { id: nextId++, x, y, size: state.size, color: state.color, opacity: state.opacity, label: state.labelText, fontSize: state.labelFontSize };
    state.balls.push(ball);
    state.selectedId = ball.id;
    pushHistory(); updateBallList(); redraw();
  }
});

canvas.addEventListener('mousemove', e => {
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  if (state.dragId !== null) {
    const b = state.balls.find(b => b.id === state.dragId);
    if (b) { b.x = x - state.dragOffX; b.y = y - state.dragOffY; redraw(); }
  } else {
    canvas.style.cursor = hitTest(x, y) ? 'move' : 'crosshair';
  }
});

canvas.addEventListener('mouseup', () => { if (state.dragId !== null) { pushHistory(); state.dragId = null; } });
canvas.addEventListener('mouseleave', () => { if (state.dragId !== null) { pushHistory(); state.dragId = null; } });
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (!state.img) return;
  const {x, y} = canvasXY(e);
  const hit = hitTest(x, y);
  if (hit) {
    state.balls = state.balls.filter(b => b.id !== hit.id);
    if (state.selectedId === hit.id) state.selectedId = null;
    pushHistory(); updateBallList(); redraw(); showToast('已刪除圓球');
  }
});

function updateBallList() {
  ballListEmpty.style.display = state.balls.length === 0 ? '' : 'none';
  ballList.innerHTML = '';
  [...state.balls].reverse().forEach(b => {
    const div = document.createElement('div');
    div.className = 'ball-item' + (b.id === state.selectedId ? ' selected' : '');
    div.innerHTML = '<div class="ball-dot" style="background:' + b.color + '"></div><div class="ball-name">' + (b.label || '（無標籤）') + '</div><div class="ball-size-text">' + b.size + 'px</div><button class="ball-del" title="刪除">\xd7</button>';
    div.addEventListener('click', ev => {
      if (ev.target.classList.contains('ball-del')) {
        state.balls = state.balls.filter(x => x.id !== b.id);
        if (state.selectedId === b.id) state.selectedId = null;
        pushHistory(); updateBallList(); redraw();
      } else { state.selectedId = b.id; updateBallList(); redraw(); }
    });
    ballList.appendChild(div);
  });
}

function pushHistory() {
  const snap = JSON.stringify(state.balls.map(b => Object.assign({}, b)));
  state.history = state.history.slice(0, state.historyIdx + 1);
  state.history.push(snap);
  state.historyIdx = state.history.length - 1;
  updateHistoryBtns();
}
function undo() { if (state.historyIdx <= 0) return; state.historyIdx--; state.balls = JSON.parse(state.history[state.historyIdx]); state.selectedId = null; updateBallList(); redraw(); updateHistoryBtns(); }
function redo() { if (state.historyIdx >= state.history.length - 1) return; state.historyIdx++; state.balls = JSON.parse(state.history[state.historyIdx]); state.selectedId = null; updateBallList(); redraw(); updateHistoryBtns(); }
function updateHistoryBtns() { undoBtn.disabled = state.historyIdx <= 0; redoBtn.disabled = state.historyIdx >= state.history.length - 1; }

document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;

sizeSlider.addEventListener('input', () => { state.size = parseInt(sizeSlider.value); sizeVal.textContent = state.size; drawPreview(); });
opacitySlider.addEventListener('input', () => { state.opacity = parseInt(opacitySlider.value)/100; opacityVal.textContent = opacitySlider.value + '%'; drawPreview(); });
labelInput.addEventListener('input', () => { state.labelText = labelInput.value; });
document.querySelectorAll('.label-size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.label-size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.labelFontSize = parseInt(btn.dataset.fsize);
  });
});

document.getElementById('load-btn').onclick = () => fileInput.click();
fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f); fileInput.value = ''; });

function loadFile(file) {
  if (!file.type.startsWith('image/')) { showToast('請選擇圖片檔案'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    state.balls = []; state.history = []; state.historyIdx = -1; state.selectedId = null;
    pushHistory(); setupCanvas(img); updateBallList(); showToast('已載入：' + file.name);
  };
  img.src = url;
}

const dropOverlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', e => { e.preventDefault(); dropOverlay.classList.remove('active'); const f = e.dataTransfer.files[0]; if (f) loadFile(f); });

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.exportFmt = btn.dataset.fmt;
  });
});

document.getElementById('export-btn').onclick = () => {
  if (!state.img) return;
  const off = document.createElement('canvas');
  off.width = state.imgW; off.height = state.imgH;
  const offCtx = off.getContext('2d');
  offCtx.drawImage(state.img, 0, 0, state.imgW, state.imgH);
  state.balls.forEach(b => {
    draw3DBall(offCtx, b.x, b.y, b.size, b.color, b.opacity);
    if (b.label) {
      const fs = b.fontSize;
      offCtx.font = fs + "px 'Noto Serif TC', serif";
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'top';
      const lx = b.x, ly = b.y + b.size + 4;
      const tw = offCtx.measureText(b.label).width;
      const pad = 4;
      offCtx.fillStyle = 'rgba(0,0,0,0.65)';
      roundRect(offCtx, lx - tw/2 - pad, ly - pad/2, tw + pad*2, fs + pad, 3);
      offCtx.fill();
      offCtx.fillStyle = '#ffffff';
      offCtx.fillText(b.label, lx, ly);
    }
  });
  const mime = {png:'image/png', jpeg:'image/jpeg', webp:'image/webp'}[state.exportFmt];
  const quality = state.exportFmt === 'png' ? undefined : 0.92;
  const a = document.createElement('a');
  a.href = off.toDataURL(mime, quality);
  a.download = 'acupuncture_' + Date.now() + '.' + state.exportFmt;
  a.click();
  showToast('已匯出 ' + state.exportFmt.toUpperCase() + ' 影像（' + state.imgW + '\xd7' + state.imgH + '）');
};

document.getElementById('clear-btn').onclick = () => {
  if (state.balls.length === 0) return;
  state.balls = []; state.selectedId = null;
  pushHistory(); updateBallList(); redraw(); showToast('已清除所有圓球');
};

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId !== null) {
    state.balls = state.balls.filter(b => b.id !== state.selectedId);
    state.selectedId = null;
    pushHistory(); updateBallList(); redraw();
  }
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

initColorGrid();
drawPreview();
pushHistory();
</script>
</body>
</html>
